meta:
  source: "NASEM 2021"
  table: "21-2"
  title: "Концентрация питательных веществ (в СВ) для скота Джерсейской породы разного возраста и стадий лактации"
  breed: "Jersey"
  note: "Потребности в энергии и протеине для сухостойных и лактирующих коров рассчитаны исходя из привеса 0.14 и 0.06 кг/сут. у первотёлок и коров соответственно."
  dcad_note: "DCAD-S (short) = [(K+ + Na+) - (Cl- + S2-)], мЭкв/кг"
  status: "complete"
  last_updated: "2026-04-22"

