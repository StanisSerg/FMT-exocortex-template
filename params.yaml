# IWE Parameters (params.yaml)
# 
# Этот файл содержит персистентные параметры, управляющие поведением протоколов IWE.
# Файл НЕ перезаписывается при обновлении (update.sh сохраняет ваши настройки).
#
# Формат: YAML
# Изменения применяются немедленно — перезапуск не требуется.

# =============================================================================
# DAY CLOSE (protocol-close.md)
# =============================================================================

# Шаг 5: Расчёт мультипликатора IWE
# Если true — при Day Close рассчитывается и показывается мультипликатор 
# (соотношение запланированного vs реального времени)
multiplier_enabled: true

# Шаг 6д: Проверка видео за день
# Если true — при Day Close проверяются не обработанные видеозаписи 
# (требует настройки video.directories в day-rhythm-config.yaml)
video_check: false

# Шаг after: Рефлексия дня
# Если true — после основного чеклиста Day Close загружается расширение
# из extensions/day-close.after.md (3 вопроса для рефлексии)
reflection_enabled: false

# =============================================================================
# QUICK CLOSE (protocol-close.md §6)
# =============================================================================

# Шаг 4b: Автоверификация кода
# Если true — при Quick Close автоматически запускается /verify code
# если в изменённых файлах есть код (.py, .ts, .sh, и т.д.)
auto_verify_code: false

# Шаг 7: Верификация чеклиста Haiku R23
# Если true — при Quick Close запускается sub-agent Haiku для проверки
# выполнения чеклиста (context isolation — VR.SOTA.002)
verify_quick_close: true

# =============================================================================
# WEEK CLOSE (week-close)
# =============================================================================

# Шаг 1: Ротация уроков в MEMORY.md
# Если true — при Week Close выполняется ротация уроков (свежие остаются,
# старые архивируются). Цель: ≤8 уроков в активной секции.
lesson_rotation: true

# =============================================================================
# РОЛИ (roles/)
# =============================================================================

# Telegram-уведомления от ролей (strategist, synchronizer, extractor)
# Если true — роли отправляют уведомления в Telegram при запуске/завершении
# Требует настройки TELEGRAM_BOT_TOKEN и TELEGRAM_CHAT_ID в .exocortex.env
telegram_notifications: false

# =============================================================================
# EXTENSIONS (extensions/)
# =============================================================================

# Директория для пользовательских расширений протоколов
# Файлы вида <protocol>.<hook>.md из этой директории автоматически
# подгружаются в соответствующие точки протоколов.
extensions_dir: extensions

# =============================================================================
# Примеры расширений (создайте файлы в extensions/):
# =============================================================================
#
# extensions/day-close.after.md — рефлексия дня (3 вопроса)
# extensions/protocol-close.checks.md — доп. проверки перед закрытием
# extensions/day-open.before.md — утренние ритуалы
#
# Подробнее: см. extensions/README.md
